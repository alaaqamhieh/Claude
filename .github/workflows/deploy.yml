name: Deploy to GitHub Pages

# Builds the game and publishes it to GitHub Pages on every push to main.
# Once enabled, the game is playable at:
#   https://alaaqamhieh.github.io/Claude/

on:
  push:
    # Deploys run from whichever of these is the repo's default branch
    # (GitHub Pages only allows deployments from the default branch).
    branches: [main, claude/little-dino-safari-game-hj4hmo]
  workflow_dispatch:

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deploy at a time; newer pushes cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache generated audio so we don't re-call the TTS API every deploy.
      - name: Cache generated audio
        uses: actions/cache@v4
        with:
          path: |
            public/voice
            public/sounds
          key: audio-${{ hashFiles('scripts/generate-audio.mjs') }}

      # Generate natural voice + soft animal sounds (needs the TTS_API_KEY
      # secret). Skips cleanly if the secret is absent — synth fallback is used.
      - name: Generate audio
        env:
          TTS_API_KEY: ${{ secrets.TTS_API_KEY }}
          TTS_PROVIDER: ${{ vars.TTS_PROVIDER }}
          TTS_VOICE_ID: ${{ vars.TTS_VOICE_ID }}
        run: node scripts/generate-audio.mjs

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages if it isn't on yet.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
